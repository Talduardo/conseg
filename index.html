<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Conseg Veículos | Nossa Equipe</title>
<meta name="description" content="Fale diretamente com a equipe Conseg Veículos."/>
<meta property="og:title" content="Conseg Veículos"/>
<meta property="og:description" content="Fale diretamente com a equipe Conseg Veículos."/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
/* ─── Design tokens — identidade Conseg Veículos ────────────────── */
:root {
  --primary:        #29ABE2;   /* azul claro do logo (CON) */
  --primary-light:  #6FC9EE;
  --dark-navy:      #2E3192;   /* azul escuro do logo (SEG) */
  --bg-a:           #0B0F2B;
  --bg-b:           #12163F;
  --card-bg:        rgba(41,171,226,.06);
  --card-bd:        rgba(41,171,226,.16);
  --text:           #EDF2FA;
  --text-muted:     #A9B3D6;
  --white:          #FFFFFF;
  --radius:         16px;
  --radius-full:    9999px;
  --space-xs:       0.5rem;
  --space-sm:       1rem;
  --space-md:       1.5rem;
  --space-lg:       2.5rem;
  --transition:     .3s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg-a);
  color: var(--text);
  font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* ─── Fundo — vídeo em tela cheia ────────────────────────────────── */
.video-stage {
  position: fixed; inset: 0; z-index: -1;
  overflow: hidden;
  background: var(--bg-a);
  pointer-events: none;
}

.video-stage video {
  position: absolute;
  top: 50%; left: 50%;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: translate(-50%, -50%);
}

/* Véu sólido — mantém contraste do texto sobre o vídeo, sem gradiente */
.video-veil {
  position: absolute; inset: 0;
  background: rgba(11, 15, 43, .58);
}

/* ─── Estrutura principal ─────────────────────────────────────────── */
main {
  width: 100%;
  max-width: 480px;
  padding: var(--space-lg) var(--space-md) var(--space-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 1;
}

/* ─── Cabeçalho / marca ───────────────────────────────────────────── */
header {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: var(--space-lg);
  text-align: center;
}

.brand-mark {
  width: 4.75rem;
  height: 4.75rem;
  border-radius: var(--radius-full);
  overflow: hidden;
  display: grid;
  place-items: center;
  margin-bottom: var(--space-sm);
  box-shadow: 0 0 32px rgba(41,171,226,.28);
  border: 2px solid rgba(41,171,226,.35);
}

.brand-mark img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: 0.35rem;
}

header p {
  font-size: 0.875rem;
  color: var(--text-muted);
  letter-spacing: 0.01em;
}

/* ─── Cards da equipe ─────────────────────────────────────────────── */
section[aria-label="Equipe"] {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.team-card {
  width: 100%;
  background: var(--card-bg);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--card-bd);
  border-radius: var(--radius);
  padding: var(--space-md);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  transition: background var(--transition), border-color var(--transition),
              box-shadow var(--transition), transform var(--transition);
}

.team-card:hover,
.team-card:focus-within {
  background: rgba(41,171,226,.10);
  border-color: rgba(41,171,226,.42);
  box-shadow: 0 0 28px rgba(41,171,226,.14);
  transform: translateY(-2px);
}

.avatar {
  flex-shrink: 0;
  width: 3.25rem;
  height: 3.25rem;
  border-radius: var(--radius-full);
  overflow: hidden;
  border: 1px solid rgba(41,171,226,.30);
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.team-info {
  flex: 1;
  min-width: 0;
}

.team-info .name {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.team-info .role {
  font-size: 0.8125rem;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.01em;
}

.contact-btn {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 2.5rem;
  height: 2.5rem;
  border-radius: var(--radius-full);
  background: rgba(41,171,226,.10);
  border: 1px solid rgba(41,171,226,.30);
  color: var(--primary-light);
  text-decoration: none;
  transition: background var(--transition), border-color var(--transition),
              color var(--transition), transform var(--transition);
}

.contact-btn:hover,
.contact-btn:focus-visible {
  background: var(--primary);
  border-color: var(--primary);
  color: var(--white);
  transform: translateY(-1px);
}

.contact-btn svg {
  width: 1.15rem;
  height: 1.15rem;
  pointer-events: none;
}

/* ─── Rodapé ───────────────────────────────────────────────────────── */
footer {
  width: 100%;
  text-align: center;
  margin-top: var(--space-lg);
}

footer p {
  font-size: 0.6875rem;
  color: var(--text-muted);
  opacity: 0.6;
  letter-spacing: 0.02em;
}

/* ─── Acessibilidade — movimento reduzido ────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  .team-card, .contact-btn { transition: none !important; }
}

/* ─── Ajuste fino mobile ──────────────────────────────────────────── */
@media (max-width: 380px) {
  main { padding: var(--space-md) var(--space-sm) var(--space-lg); }
  .team-card { padding: var(--space-sm); gap: 0.75rem; }
  .avatar { width: 2.85rem; height: 2.85rem; }
}
</style>
</head>
