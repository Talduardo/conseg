<style>
/* ─── Design tokens — identidade Conseg Veículos ────────────────── */
:root {
  --primary:        #29ABE2;   /* azul claro do logo (CON) */
  --primary-light:  #6FC9EE;
  --dark-navy:      #2E3192;   /* azul escuro do logo (SEG) */
  --bg-a:           #0B0F2B;
  --bg-b:           #12163F;
  --card-bg:        rgba(41,171,226,.06);
  --card-bd:        rgba(41,171,226,.16);
  --text:           #EDF2FA;
  --text-muted:     #A9B3D6;
  --white:          #FFFFFF;
  --radius:         16px;
  --radius-full:    9999px;
  --space-xs:       0.5rem;
  --space-sm:       1rem;
  --space-md:       1.5rem;
  --space-lg:       2.5rem;
  --transition:     .3s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg-a);
  color: var(--text);
  font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* ─── Fundo — veículo minimalista em movimento contínuo ─────────────
     Silhueta de carro em traço único (mesma linguagem do ícone da
     marca), atravessando a tela em loop, sobre fundo sólido —
     sem gradientes de cor.                                          */
.vehicle-stage {
  position: fixed; inset: 0; z-index: -1;
  overflow: hidden;
  background: var(--bg-a);
  pointer-events: none;
}

.road-line {
  position: absolute;
  bottom: 30%;
  left: 0;
  width: 100%;
  height: 2px;
  background-image: repeating-linear-gradient(90deg,
    var(--primary) 0, var(--primary) 34px, transparent 34px, transparent 74px);
  opacity: .22;
  background-size: 74px 2px;
  animation: road-scroll 1.6s linear infinite;
}

@keyframes road-scroll {
  to { background-position: -74px 0; }
}

.car-track {
  position: absolute;
  bottom: calc(30% - 40px);
  left: -280px;
  width: 240px;
  animation: drive-by 15s linear infinite;
}

@keyframes drive-by {
  from { left: -280px; }
  to   { left: 100%; }
}

.car-track .car-body   { fill: var(--dark-navy); }
.car-track .car-roof   { fill: none; stroke: var(--primary); stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
.car-track .car-window { fill: var(--bg-a); }
.car-track .headlight  { fill: var(--primary-light); opacity: .85; }
.car-track .wheel      { fill: var(--bg-a); stroke: var(--primary); stroke-width: 3; }
.car-track .wheel-spin { transform-origin: center; animation: wheel-spin .55s linear infinite; }

@keyframes wheel-spin {
  to { transform: rotate(360deg); }
}

/* ─── Estrutura principal ─────────────────────────────────────────── */
main {
  width: 100%;
  max-width: 480px;
  padding: var(--space-lg) var(--space-md) var(--space-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 1;
}

/* ─── Cabeçalho / marca ───────────────────────────────────────────── */
header {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: var(--space-lg);
  text-align: center;
}

.brand-mark {
  width: 4.75rem;
  height: 4.75rem;
  border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--primary) 0%, var(--dark-navy) 100%);
  display: grid;
  place-items: center;
  margin-bottom: var(--space-sm);
  box-shadow: 0 0 32px rgba(41,171,226,.28);
}

.brand-mark span {
  font-weight: 700;
  font-size: 1.4rem;
  letter-spacing: -0.02em;
  color: var(--white);
}

h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: 0.35rem;
}

header p {
  font-size: 0.875rem;
  color: var(--text-muted);
  letter-spacing: 0.01em;
}

/* ─── Cards da equipe ─────────────────────────────────────────────── */
section[aria-label="Equipe"] {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.team-card {
  width: 100%;
  background: var(--card-bg);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--card-bd);
  border-radius: var(--radius);
  padding: var(--space-md);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  transition: background var(--transition), border-color var(--transition),
              box-shadow var(--transition), transform var(--transition);
}

.team-card:hover,
.team-card:focus-within {
  background: rgba(41,171,226,.10);
  border-color: rgba(41,171,226,.42);
  box-shadow: 0 0 28px rgba(41,171,226,.14);
  transform: translateY(-2px);
}

.avatar {
  flex-shrink: 0;
  width: 3.25rem;
  height: 3.25rem;
  border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--dark-navy) 0%, var(--primary) 100%);
  display: grid;
  place-items: center;
  font-weight: 600;
  font-size: 1rem;
  color: var(--white);
  letter-spacing: 0.02em;
}

.team-info {
  flex: 1;
  min-width: 0;
}

.team-info .name {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.team-info .role {
  font-size: 0.8125rem;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.01em;
}

.contact-btn {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 2.5rem;
  height: 2.5rem;
  border-radius: var(--radius-full);
  background: rgba(41,171,226,.10);
  border: 1px solid rgba(41,171,226,.30);
  color: var(--primary-light);
  text-decoration: none;
  transition: background var(--transition), border-color var(--transition),
              color var(--transition), transform var(--transition);
}

.contact-btn:hover,
.contact-btn:focus-visible {
  background: var(--primary);
  border-color: var(--primary);
  color: var(--white);
  transform: translateY(-1px);
}

.contact-btn svg {
  width: 1.15rem;
  height: 1.15rem;
  pointer-events: none;
}

/* ─── Rodapé ───────────────────────────────────────────────────────── */
footer {
  width: 100%;
  text-align: center;
  margin-top: var(--space-lg);
}

footer p {
  font-size: 0.6875rem;
  color: var(--text-muted);
  opacity: 0.6;
  letter-spacing: 0.02em;
}

/* ─── Acessibilidade — movimento reduzido ────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  .team-card, .contact-btn { transition: none !important; }
  .road-line, .car-track, .wheel-spin { animation: none !important; }
  .car-track { left: 8%; }
}

/* ─── Ajuste fino mobile ──────────────────────────────────────────── */
@media (max-width: 380px) {
  main { padding: var(--space-md) var(--space-sm) var(--space-lg); }
  .team-card { padding: var(--space-sm); gap: 0.75rem; }
  .avatar { width: 2.85rem; height: 2.85rem; font-size: 0.9rem; }
}
</style>
</head>
